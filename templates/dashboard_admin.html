{% extends "layout.html" %}
{% block content %}
<h1 style="font-weight: 800;">Global Fleet Monitor</h1>
<div id="map" style="height: 450px; border-radius: 24px; border: 5px solid white;"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([8.486, 124.65], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
    {{ puvs|tojson }}.forEach(p => {
        const color = p.is_violator ? '#ef4444' : '#10b981';
        L.circleMarker([p.lat, p.lng], { radius: 10, fillColor: color, color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map).bindPopup(p.company);
    });
</script>
{% endblock %}
