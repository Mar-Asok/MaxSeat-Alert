<!DOCTYPE html>
<html>
<head>
    <title>MaxSeat Login</title>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        body { 
            background: linear-gradient(135deg, #d9f2ff 0%, #b3e5fc 100%); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .card { 
            background: white; padding: 40px; border-radius: 24px; width: 350px; 
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            animation: fadeIn 0.8s ease-out; 
        }
        .logo-img { width: 100%; margin-bottom: 25px; border-radius: 10px; }
        input { 
            width: 100%; padding: 14px; margin: 10px 0; border: 2px solid transparent; 
            background: #f0f4f8; border-radius: 12px; transition: 0.3s; box-sizing: border-box; 
        }
        input:focus { outline: none; border-color: #b3e5fc; background: white; }
        button { 
            width: 100%; padding: 14px; background: #1a1a1a; color: white; 
            border: none; border-radius: 30px; cursor: pointer; font-weight: bold; 
            margin-top: 20px; transition: 0.3s; 
        }
        button:hover { background: #444; transform: scale(1.02); }
        .error { color: #e53935; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo-img">
        <form method="POST">
            <input type="text" name="username" placeholder="Admin Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        {% with m = get_flashed_messages() %}{% if m %}<p class="error">{{ m[0] }}</p>{% endif %}{% endwith %}
    </div>
</body>
</html>
