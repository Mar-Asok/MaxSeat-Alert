<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MaxSeat - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; }
        body { margin: 0; font-family: 'Plus Jakarta Sans'; transition: background 0.8s ease; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .bg-admin { background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); }
        .bg-enforcer { background: linear-gradient(135deg, #fff1f2 0%, #fecaca 100%); }
        .bg-coop { background: linear-gradient(135deg, #f0fdf4 0%, #bbf7d0 100%); }
        .card { background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); padding: 40px; border-radius: 32px; width: 380px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
        .alert { background: #fee2e2; color: var(--danger); padding: 12px; border-radius: 12px; font-size: 13px; margin-bottom: 20px; border: 1px solid #fecaca; }
        select, input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 14px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: #000; color: white; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        @keyframes swap { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .animate { animation: swap 0.4s ease; }
    </style>
</head>
<body class="bg-admin">
    <div class="card">
        <img src="{{ url_for('static', filename='logo.png') }}" style="max-width: 160px; margin-bottom: 20px;">
        {% with messages = get_flashed_messages() %}{% if messages %}{% for m in messages %}
            <div class="alert"><i class="fa-solid fa-circle-exclamation"></i> {{ m }}</div>
        {% endfor %}{% endif %}{% endwith %}
        <div id="icon-box" style="font-size: 45px; color: var(--primary); margin-bottom: 10px;"><i id="role-icon" class="fa-solid fa-user-shield"></i></div>
        <h2 id="role-title" style="margin: 0; font-weight: 800;">Admin Portal</h2>
        <form method="POST">
            <select name="role" id="role-select" onchange="updateUI()">
                <option value="admin">Login as Admin</option>
                <option value="enforcer">Login as Enforcer</option>
                <option value="cooperative">Login as Cooperative</option>
            </select>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <p style="font-size: 13px; margin-top: 25px;">No account? <a href="/register" style="color:var(--primary); font-weight:700; text-decoration:none;">Register</a></p>
    </div>
    <script>
        function updateUI() {
            const role = document.getElementById('role-select').value;
            const body = document.body; const icon = document.getElementById('role-icon');
            const title = document.getElementById('role-title');
            body.className = ''; title.classList.remove('animate'); void title.offsetWidth; title.classList.add('animate');
            localStorage.setItem('selectedRole', role);
            if(role === 'admin') { body.classList.add('bg-admin'); icon.className = 'fa-solid fa-user-shield'; title.innerText = 'Admin Portal'; }
            else if(role === 'enforcer') { body.classList.add('bg-enforcer'); icon.className = 'fa-solid fa-person-military-pointing'; title.innerText = 'Enforcer Portal'; }
            else { body.classList.add('bg-coop'); icon.className = 'fa-solid fa-bus'; title.innerText = 'Cooperative Portal'; }
        }
        window.onload = () => { 
            const saved = localStorage.getItem('selectedRole') || 'admin';
            document.getElementById('role-select').value = saved; updateUI();
        };
    </script>
</body>
</html>
