<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MaxSeat - Create Account</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; }
        body { 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        .bg-admin { background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); }
        .bg-enforcer { background: linear-gradient(135deg, #fff1f2 0%, #fecaca 100%); }
        .bg-coop { background: linear-gradient(135deg, #f0fdf4 0%, #bbf7d0 100%); }

        .glass-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 32px; width: 380px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.3);
            animation: cardEnter 0.6s ease-out;
        }
        @keyframes cardEnter { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes roleSwap {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-swap { animation: roleSwap 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .alert { background: #fee2e2; color: var(--danger); padding: 12px; border-radius: 12px; font-size: 13px; margin-bottom: 20px; border: 1px solid #fecaca; }

        .icon-box { font-size: 45px; color: var(--primary); margin-bottom: 10px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 14px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 16px; background: #000; color: white; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: var(--primary); transform: translateY(-2px); }
    </style>
</head>
<body class="bg-admin">
    <div class="glass-card">
        <img src="{{ url_for('static', filename='logo.png') }}" style="max-width: 140px; margin-bottom: 20px;">
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert"><i class="fa-solid fa-circle-exclamation"></i> {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="icon-box"><i id="role-icon" class="fa-solid fa-user-plus"></i></div>
        <h2 id="role-title" style="margin: 0; font-weight: 800;">Register Account</h2>
        
        <form method="POST">
            <select name="role" id="role-select" onchange="saveAndUpdateUI()">
                <option value="admin">Register as Admin</option>
                <option value="enforcer">Register as Enforcer</option>
                <option value="cooperative">Register as Cooperative</option>
            </select>
            <input type="text" name="username" placeholder="Username (min 4 chars)" required>
            <input type="password" name="password" placeholder="Password (min 6 chars)" required>
            <button type="submit">Sign Up</button>
        </form>
        <p style="font-size: 13px; margin-top: 25px; color: #64748b;"><a href="/login" style="color:var(--primary); font-weight:700; text-decoration:none;">Back to Login</a></p>
    </div>

    <script>
        function updateUI(role) {
            const body = document.body;
            const icon = document.getElementById('role-icon');
            const title = document.getElementById('role-title');
            const select = document.getElementById('role-select');
            
            body.className = ''; select.value = role;

            title.classList.remove('animate-swap');
            void title.offsetWidth; 
            title.classList.add('animate-swap');

            if(role === 'admin') body.classList.add('bg-admin');
            else if(role === 'enforcer') body.classList.add('bg-enforcer');
            else body.classList.add('bg-coop');
        }
        function saveAndUpdateUI() {
            const role = document.getElementById('role-select').value;
            localStorage.setItem('selectedRole', role);
            updateUI(role);
        }
        window.onload = () => updateUI(localStorage.getItem('selectedRole') || 'admin');
    </script>

    {% if success %}
    <script>
        Swal.fire({
            title: 'Account Created!',
            text: 'Security restrictions passed. Please login.',
            icon: 'success',
            confirmButtonColor: '#000',
            timer: 3000,
            willClose: () => { window.location.href = "/login"; }
        });
    </script>
    {% endif %}
</body>
</html>
